  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

F0EC; overflow-x:hidden; }\n\n    @keyframes tickerMove { from { transform:translateX(0); } to { transform:translateX(-50%); } }\n    @keyframes ttkPulse { 0%,100%{opacity:1;} 50%{opacity:0.25;} }\n    .ttk-bar:hover .ttk-track { animation-play-state:paused; }\n    .ttk-item:hover .ttk-title { color:#C8191A !important; }\n    @media (max-width:640px){ .ttk-upd { display:none !important; } }\n    @media (prefers-reduced-motion:reduce){\n      .ttk-track { animation:none !important; }\n      .ttk-dot { animation:none !important; }\n    }\n\n    .btn-red { transition:background 0.2s, transform 0.15s; display:inline-block; }\n    .btn-red:hover { background:#E01F20 !important; }\n    .btn-red:active { transform:scale(0.97); }\n\n    [data-reveal] { opacity:0; transform:translateY(20px); transition:opacity 0.75s ease, transform 0.75s ease; }\n    [data-reveal].revealed { opacity:1; transform:translateY(0); }\n    [data-reveal][data-d=\"1\"] { transition-delay:0.1s; }\n    [data-reveal][data-d=\"2\"] { transition-delay:0.2s; }\n\n    /* ── ACCORDION ── */\n    .svc-item { border-top:1px solid rgba(244,240,236,0.1); }\n    .svc-item:last-of-type { border-bottom:1px solid rgba(244,240,236,0.1); }\n\n    .svc-header {\n      display:flex; align-items:center; gap:28px;\n      padding:38px 0; cursor:pointer; user-select:none;\n      transition:padding-left 0.35s ease;\n    }\n    .svc-header:hover { padding-left:12px; }\n    .svc-item.open .svc-header { padding-left:12px; }\n\n    .svc-num {\n      font:400 13px/1 'Sora',sans-serif; color:#C8191A; letter-spacing:0.1em;\n      flex-shrink:0; width:32px;\n    }\n    .svc-name {\n      font:900 clamp(28px,4vw,52px)/1 'Archivo Black',sans-serif;\n      letter-spacing:-0.02em; flex:1;\n      color:rgba(244,240,236,0.55); transition:color 0.3s ease;\n    }\n    .svc-header:hover .svc-name { color:#F4F0EC; }\n    .svc-item.open .svc-name { color:#F4F0EC; }\n\n    .svc-tag {\n      font:400 11px/1.4 'Sora',sans-serif; letter-spacing:0.06em;\n      color:rgba(244,240,236,0.32); text-align:right; max-width:220px;\n      flex-shrink:0;\n    }\n\n    .svc-icon { position:relative; width:20px; height:20px; flex-shrink:0; }\n    .svc-icon-h, .svc-icon-v { position:absolute; background:#C8191A; }\n    .svc-icon-h { top:50%; left:0; width:20px; height:2px; transform:translateY(-50%); }\n    .svc-icon-v { left:50%; top:0; width:2px; height:20px; transform:translateX(-50%); transition:transform 0.35s ease; }\n    .svc-item.open .svc-icon-v { transform:translateX(-50%) scaleY(0); }\n\n    .svc-panel {\n      display:grid; grid-template-rows:0fr;\n      transition:grid-template-rows 0.5s cubic-bezier(0.4,0,0.2,1);\n    }\n    .svc-item.open .svc-panel { grid-template-rows:1fr; }\n    .svc-panel-inner { overflow:hidden; }\n    .svc-panel-content {\n      padding:4px 0 52px 12px;\n      display:flex; gap:64px; align-items:flex-start;\n      opacity:0; transition:opacity 0.4s ease 0.1s;\n    }\n    .svc-item.open .svc-panel-content { opacity:1; }\n\n    /* ── UGC growth animation ── */\n    .grow-el { opacity:0; transform:translateY(24px); transition:opacity 0.7s ease, transform 0.7s ease; }\n    .svc-item.open .grow-el { opacity:1; transform:translateY(0); }\n    .grow-stage { opacity:0; transform:translateY(34px) scale(0.88); transform-origin:bottom center; transition:opacity 0.8s ease, transform 0.9s cubic-bezier(0.34,1.4,0.64,1); }\n    .svc-item.open .grow-stage { opacity:1; transform:none; }\n    .gd-1 { transition-delay:0.15s; } .gd-2 { transition-delay:0.3s; } .gd-3 { transition-delay:0.45s; }\n    .gd-4 { transition-delay:0.6s; } .gd-5 { transition-delay:0.75s; } .gd-6 { transition-delay:0.9s; }\n    .gd-7 { transition-delay:1.05s; } .gd-8 { transition-delay:1.2s; }\n    .ugc-grid { display:grid; grid-template-columns:100fr 120fr 130fr 185fr; gap:0; width:100%; }\n    .ugc-strip {\n      mask-image:linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);\n      -webkit-mask-image:linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);\n    }\n    .grow-row { display:flex; gap:20px; width:100%; }\n    .grow-stage img {\n      mask-image:linear-gradient(to bottom, transparent 0%, black 22%, black 88%, rgba(0,0,0,0.55) 100%);\n      -webkit-mask-image:linear-gradient(to bottom, transparent 0%, black 22%, black 88%, rgba(0,0,0,0.55) 100%);\n    }\n    .ugc-swash { mix-blend-mode:screen; }\n    .approach-label { font:600 10px/1 'Sora',sans-serif; letter-spacing:0.18em; text-transform:uppercase; color:rgba(244,240,236,0.32); margin:0 0 16px; padding-top:36px; border-top:1px solid rgba(244,240,236,0.08); }\n    .approach-label:first-child { padding-top:0; border-top:none; }\n    .car-stage { position:relative; width:100%; height:290px; overflow:hidden; cursor:grab; }\n    .car-stage:active { cursor:grabbing; }\n    .car-card-abs { position:absolute; left:50%; top:50%; width:150px; height:230px; border-radius:10px; overflow:hidden; background:#151313; will-change:transform,opacity,filter; transition:transform 0.7s cubic-bezier(0.4,0,0.2,1), opacity 0.7s ease, filter 0.7s ease; }\n    .car-card-abs.is-active { box-shadow:0 0 0 2px #C8191A, 0 20px 50px rgba(0,0,0,0.5); }\n    .car-views { position:absolute; left:10px; bottom:10px; display:flex; align-items:center; gap:5px; font:600 11px/1 'Sora',sans-serif; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.6); z-index:2; pointer-events:none; }\n    .car-play { width:14px; height:14px; flex-shrink:0; }\n    .car-dots { display:flex; gap:6px; justify-content:center; width:100%; margin-top:18px; margin-bottom:48px; }\n    .car-dot { width:10px; height:10px; border-radius:50%; background:rgba(244,240,236,0.2); transition:background 0.3s ease, transform 0.3s ease; border:none; padding:0; cursor:pointer; }\n    .car-dot:hover { background:rgba(244,240,236,0.45); }\n    .car-dot.is-active { background:#C8191A; transform:scale(1.3); }\n\n    /* ── pipeline flow ── */\n    .pipe-icon- :100%;display:flex;align-items:center;white-space:nowrap;will-change:transform;animation:tickerMove {{ tickerDuration }}s linear infinite;\">\n      <sc-for list=\"{{ tickerItems }}\" as=\"it\" hint-placeholder-count=\"8\">\n        <a class=\"ttk-item\" href=\"{{ it.url }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:9px;padding:0 22px;text-decoration:none;color:#F4F0EC;\">\n          <span style=\"font:700 8px/1 'Sora',sans-serif;letter-spacing:0.14em;padding:3px 6px;border:1px solid {{ it.color }};color:{{ it.color }};\">{{ it.badge }}<\u002Fspan>\n          <span class=\"ttk-title\" style=\"font:400 11px/1 'Sora',sans-serif;transition:color 0.2s;\">{{ it.title }}<\u002Fspan>\n          <span style=\"font:300 10px/1 'Sora',sans-serif;color:rgba(244,240,236,0.62);font-variant-numeric:tabular-nums;\">{{ it.traffic }}<\u002Fspan>\n          <span style=\"color:rgba(200,25,26,0.55);font-size:11px;padding-left:22px;\">▪<\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ttk-upd\" style=\"display:flex;align-items:center;padding:0 14px;border-left:1px solid rgba(244,240,236,0.08);color:rgba(244,240,236,0.28);font:400 8px/1 'Sora',sans-serif;letter-spacing:0.12em;white-space:nowrap;z-index:2;background:#0D0B0B;\">{{ updatedLabel }}<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- NAV -->\n<dc-import name=\"RR Nav\" base=\"RR Media - Website.dc.html\" solid=\"{{ true }}\" hint-size=\"100%,72px\"><\u002Fdc-import>\n\n<!-- HERO -->\n<section class=\"rr-sec\" style=\"padding:80px 60px 48px;\">\n  <div data-reveal=\"\" style=\"font:400 10px/1 'Sora',sans-serif;letter-spacing:0.24em;text-transform:uppercase;color:rgba(244,240,236,0.25);margin-bottom:20px;\">Services<\u002Fdiv>\n  <div data-reveal=\"\" data-d=\"1\" style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:40px;flex-wrap:wrap;\">\n    <h1 style=\"font:900 clamp(48px,7vw,88px)/0.9 'Archivo Black',sans-serif;color:#F4F0EC g:100px 60px;background:#0D0B0B;border-top:1px solid rgba(244,240,236,0.06);\">\n  <div style=\"max-width:640px;\">\n    <div data-reveal=\"\" style=\"font:400 10px/1 'Sora',sans-serif;letter-spacing:0.24em;text-transform:uppercase;color:rgba(244,240,236,0.25);margin-bottom:20px;\">Not sure which you need?<\u002Fdiv>\n    <div data-reveal=\"\" data-d=\"1\" style=\"font:400 clamp(36px,5vw,56px)/1.05 'DM Serif Display',serif;color:#F4F0EC;margin-bottom:20px;\">Let's figure it out together.<\u002Fdiv>\n    <p data-reveal=\"\" data-d=\"2\" style=\"font:300 16px/1.75 'Sora',sans-serif;color:rgba(244,240,236,0.45);margin-bottom:36px;\">Tell us about your brand and goals — we'll recommend exactly the right mix of services, no commitment required.<\u002Fp>\n    <a href=\"RR Media - Website.dc.html#contact\" class=\"btn-red\" data-reveal=\"\" data-d=\"2\" style=\"font:500 11px/1 'Sora',sans-serif;letter-spacing:0.18em;text-transform:uppercase;color:#F4F0EC;background:#C8191A;padding:18px 36px;text-decoration:none;\">Start the conversation →<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer style=\"padding:36px 60px;display:flex;align-items:center;justify-content:space-between;gap:24px;border-top:1px solid rgba(244,240,236,0.06);flex-wrap:wrap;\">\n  <span style=\"font:400 14px/1 'DM Serif Display',serif;color:rgba(244,240,236,0.35);\"><span style=\"display:inline-block;transform:scaleX(-1);\">R<\u002Fspan>&amp;R MEDIA<\u002Fspan>\n  <span style=\"font:300 10px/1 'Sora',sans-serif;color:rgba(244,240,236,0.18);letter-spacing:0.06em;\">© 2026 R&amp;R Media. All rights reserved.<\u002Fspan>\n  <div style=\"display:flex;gap:28px;\">\n    <a href=\"#\" style=\"font:400 9px/1 'Sora',sans-serif;letter-spacing:0.14em;text-transform:uppercase;color:rgba(244,240,236,0.22);text-decoration:none;\">Instagram<\u002Fa>\n    <a href=\"#\" style=\"font:400 9px/1 'Sora',sans-serif;letter-spacing:0.14em;text-transform:uppercase;color:rgba(244,240,236,0.22);text-decoration:none;\">TikTok<\u002Fa>\n    <a href=\"#\" style=\"font:400 9px/1 'Sora',sans-serif;letter-spacing:0.14em;text-transform:uppercase;color:rgba(244,240,236,0.22);text-decoration:none;\">LinkedIn<\u002Fa>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;feedUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Trending crawl&quot;},&quot;crawlLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;TRENDING&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Trending crawl&quot;},&quot;tickerSpeed&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:60,&quot;min&quot;:30,&quot;max&quot;:140,&quot;step&quot;:5,&quot;unit&quot;:&quot;px/s&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Trending crawl&quot;},&quot;pollMinutes&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:15,&quot;min&quot;:10,&quot;max&quot;:60,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Trending crawl&quot;}}\">\nclass Component extends DCLogic {\n  state = { carActive: 3, carDir: 1, carPaused: false, smActiveIdx: 0, adActiveIdx: 0,\n    feed: {\n      updatedAt: null,\n      items: [\n        { source: \"google\", title: \"solar eclipse 2026\", traffic: \"2M+ searches\", url: \"https://trends.google.com/trending?geo=US\" },\n        { source: \"tiktok\", title: \"#cabincore\", traffic: \"48M views\", url: \"https://www.tiktok.com/tag/cabincore\" },\n        { source: \"instagram\", title: \"#setlife\", traffic: \"2.1M posts\", url: \"https://www.instagram.com/explore/tags/setlife/\" },\n        { source: \"reddit\", title: \"Scientists confirm breakthrough in fusion energy timeline\", traffic: \"142K upvotes\", url: \"https://www.reddit.com/r/popular/\" },\n        { source: \"youtube\", title: \"Official Trailer — the one everyone is talking about\", traffic: \"8.4M views\", url: \"https://www.youtube.com\" },\n        { source: \"google\", title: \"nba finals game 5\", traffic: \"1M+ searches\", url: \"https://trends.google.com/trending?geo=US\" },\n        { source: \"tiktok\", title: \"#filmmaking\", traffic: \"12M views\", url: \"https://www.tiktok.com/tag/filmmaking\" },\n        { source: \"instagram\", title: \"#nashville\", traffic: \"890K posts\", url: \"https://www.instagram.com/explore/tags/nashville/\" },\n        { source: \"reddit\", title: \"This practical effect took our crew 6 weeks to build\", traffic: \"98K upvotes\", url: \"https://www.reddit.com/r/popular/\" },\n        { source: \"google\", title: \"tropical storm update\", traffic: \"500K+ searches\", url: \"https://trends.google.com/trending?geo=US\" },\n      ],\n    },\n  };\n\n  sourceMeta(source) {\n    return ({\n      google:    { badge: \"GOOGLE\",  color: \"#7FA6E8\" },\n      tiktok:    { badge: \"TIKTOK\",  color: \"#6FD6C4\" },\n      instagram: { badge: \"IG\",      color: \"#DE8BB1\" },\n      reddit:    { badge: \"REDDIT\",  color: \"#E8A470\" },\n      youtube:   { badge: \"YOUTUBE\", color: \"#E87D7A\" },\n    })[source] || { badge: (source || \"\").toUpperCase(), color: \"#9aa4b2\" };\n  }\n\n  loadFeed() {\n    const url = this.props.feedUrl;\n    if (!url) return;\n    fetch(url, { cache: \"no-store\" })\n      .then(r => r.json())\n      .then(feed => { if (feed && feed.items && feed.items.length) this.setState({ feed }); })\n      .catch(err => console.warn(\"[trend-ticker] feed fetch failed:\", err.message));\n  }\n\n  static AD_CAMPAIGNS = [\n    { name: 'Skincare shoppers', desc: 'Women 24–40 · beauty & self-care', brand: 'glowlab.skin', face: 'https://i.pravatar.cc/100?img=45',\n      img: 'https://picsum.photos/seed/rrad-skincare/480/600', likes: '8,734', comments: '64', shares: '102K',\n      reach: '1.2M+', engagement: '8.7%', conversions: '24,631', roas: '3.2×' },\n    { name: 'Home fitness', desc: 'Men & women 20–35 · training at home', brand: 'corekit.fit', face: 'https://i.pravatar.cc/100?img=12',\n      img: 'https://picsum.photos/seed/rrad-fitness/480/600', likes: '12,208', comments: '213', shares: '87K',\n      reach: '940K', engagement: '11.2%', conversions: '18,447', roas: '4.6×' },\n    { name: 'New parents', desc: 'Parents 26–42 · baby & household', brand: 'nestly.home', face: 'https://i.pravatar.cc/100?img=26',\n      img: 'https://picsum.photos/seed/rrad-parents/480/600', likes: '5,491', comments: '148', shares: '44K',\n      reach: '2.1M+', engagement: '6.4%', conversions: '31,905', roas: '2.8×' }\n  ];\n\n  static CAR_COUNT = 14;\n  static CAR_VIEWS = ['1.2M','2.7M','4.1M','1.8M','2.3M','3.4M','950K','5.6M','2.1M','1.4M','3.9M','2.8M','1.6M','4.4M'];\n\n  static SM_PLATFORMS = [\n    { name: 'TikTok', lift: '5.1×', reach: '84%', icon: '\\u266A',\n      formats: [{ name: 'Duet-style demos', metric: '6.8% CVR', pct: 100 }, { name: 'Trend remixes', metric: '5.2% CVR', pct: 76 }, { name: 'Founder POV', metric: '4.4% CVR', pct: 64 }],\n      tags: ['Trend-jacking', 'Sound-first', 'Fast cuts'] },\n    { name: 'Instagram', lift: '3.4×', reach: '62%', icon: '\\u25A0',\n      formats: [{ name: 'Carousel breakdowns', metric: '5.9% CVR', pct: 100 }, { name: 'Reels tutorials', metric: '5.1% CVR', pct: 86 }, { name: 'Story polls', metric: '3.6% CVR', pct: 61 }],\n      tags: ['Aesthetic-led', 'Save-worthy', 'Shoppable tags'] },\n    { name: 'YouTube', lift: '2.2×', reach: '40%', icon: '\\u25B6',\n      formats: [{ name: 'Long-form reviews', metric: '4.8% CVR', pct: 100 }, { name: 'Shorts recaps', metric: '3.9% CVR', pct: 81 }, { name: 'Unboxings', metric: '3.1% CVR', pct: 65 }],\n      tags: ['Evergreen', 'SEO-friendly', 'Deep-dive'] },\n    { name: 'Facebook', lift: '1.8×', reach: '28%', icon: 'f',\n      formats: [{ name: 'Customer testimonials', metric: '3.7% CVR', pct: 100 }, { name: 'Group discussions', metric: '2.9% CVR', pct: 78 }, { name: 'Live Q&A', metric: '2.4% CVR', pct: 65 }],\n      tags: ['Community-first', 'Trust signals', 'Older demo'] },\n    { name: 'LinkedIn', lift: '2.6×', reach: '51%', icon: 'in',\n      formats: [{ name: 'Founder essays', metric: '4.1% CVR', pct: 100 }, { name: 'Case study posts', metric: '3.5% CVR', pct: 85 }, { name: 'Team culture clips', metric: '2.8% CVR', pct: 68 }],\n      tags: ['B2B trust', 'Thought leadership', 'Long copy'] },\n    { name: 'Pinterest', lift: '3.0×', reach: '45%', icon: '\\u25CF',\n      formats: [{ name: 'Idea pins', metric: '4.6% CVR', pct: 100 }, { name: 'Product roundups', metric: '3.8% CVR', pct: 82 }, { name: 'Seasonal boards', metric: '3.0% CVR', pct: 65 }],\n      tags: ['Discovery-led', 'Long shelf life', 'Visual-first'] },\n    { name: 'Threads', lift: '2.4×', reach: '33%', icon: '@',\n      formats: [{ name: 'Hot takes', metric: '3.4% CVR', pct: 100 }, { name: 'Behind-the-scenes', metric: '2.8% CVR', pct: 82 }, { name: 'Reply threads', metric: '2.1% CVR', pct: 62 }],\n      tags: ['Conversational', 'Text-first', 'Real-time'] }\n  ];\n\n  pauseCarousel = () => this.setState({ carPaused: true });\n  resumeCarousel = () => this.setState({ carPaused: false });\n\n  carDragStart = (e) => {\n    e.preventDefault();\n    this._drag = { x: e.clientX, startActive: this.state.carActive, moved: false };\n  };\n  carDragMove = (e) => {\n    if (!this._drag) return;\n    const dx = e.clientX - this._drag.x;\n    if (Math.abs(dx) > 5) this._drag.moved = true;\n    const steps = Math.round(-dx / 108);\n    const N = Component.CAR_COUNT;\n    const next = ((this._drag.startActive + steps) % N + N) % N;\n    if (next !== this.state.carActive) this.setState({ carActive: next });\n  };\n  carDragEnd = (e) => {\n    if (this._drag && !this._drag.moved) {\n      const card = e.target.closest && e.target.closest('.car-card-abs');\n      if (card) {\n        const cards = Array.from(card.parentElement.querySelectorAll('.car-card-abs'));\n        const idx = cards.indexOf(card);\n        if (idx >= 0 && idx !== this.state.carActive) this.setState({ carActive: idx });\n      }\n    }\n    this._drag = null;\n  };\n  carDragLeave = () => {\n    this._drag = null;\n    this.resumeCarousel();\n  };\n\n  renderVals() {\n    const N = Component.CAR_COUNT;\n    const active = this.state.carActive;\n    const carVals = {};\n    for (let i = 0; i < N; i++) {\n      let offset = i - active;\n      if (offset > N / 2) offset -= N;\n      if (offset < -N / 2) offset += N;\n      const abs = Math.abs(offset);\n      const visible = abs <= 3;\n      const scale = visible ? 1 - abs * 0.15 : 0.55;\n      const tx = offset * 108;\n      const ty = abs * 8;\n      const opacity = visible ? Math.max(0, 1 - abs * 0.25) : 0;\n      const z = 100 - abs;\n      const blur = visible ? abs * 1.1 : 5;\n      const pe = visible ? 'auto' : 'none';\n      carVals['carCls' + (i + 1)] = offset === 0 ? 'is-active' : '';\n      carVals['carStyle' + (i + 1)] = `transform:translate(-50%,-50%) translateX(${tx}px) translateY(${ty}px) scale(${scale});opacity:${opacity};z-index:${z};filter:blur(${blur}px);pointer-events:${pe};`;\n    }\n    const carDots = [];\n    for (let i = 0; i < N; i++) {\n      carDots.push({ activeClass: i === active ? 'is-active' : '', onSelect: () => this.setState({ carActive: i }) });\n    }\n    const maxLift = Math.max(...Component.SM_PLATFORMS.map(p => parseFloat(p.lift)));\n    const smIdx = this.state.smActiveIdx;\n    const smPlatforms = Component.SM_PLATFORMS.map((p, i) => ({\n      name: p.name,\n      lift: p.lift,\n      pillClass: i === smIdx ? 'is-active' : '',\n      barStyle: `width:${(parseFloat(p.lift) / maxLift) * 100}%;`,\n      onSelect: () => this.setState({ smActiveIdx: i })\n    }));\n    const activeP = Component.SM_PLATFORMS[smIdx];\n    const smActive = {\n      name: activeP.name,\n      icon: activeP.icon,\n      lift: activeP.lift,\n      reach: activeP.reach,\n      rank: '#' + (smIdx + 1) + ' by lift',\n      formats: activeP.formats.map(f => ({ name: f.name, metric: f.metric, barStyle: `width:${f.pct}%;` })),\n      tags: activeP.tags\n    };\n\n    const adIdx = this.state.adActiveIdx;\n    const adActive = Component.AD_CAMPAIGNS[adIdx];\n\n    const tItems = (this.state.feed.items || []).map(it => ({ ...it, ...this.sourceMeta(it.source), traffic: it.traffic || \"\" }));\n    const tSpeed = this.props.tickerSpeed ?? 60;\n    const tUpd = this.state.feed.updatedAt\n      ? \"UPD \" + new Date(this.state.feed.updatedAt).toLocaleTimeString([], { hour: \"2-digit\", minute: \"2-digit\" })\n      : \"LIVE\";\n\n    return {\n      crawlLabel: this.props.crawlLabel ?? \"TRENDING\",\n      tickerItems: [...tItems, ...tItems],\n      tickerDuration: Math.max(20, Math.round(tItems.length * 320 / tSpeed)),\n      updatedLabel: tUpd,\n      ...carVals, carDots, pauseCarousel: this.pauseCarousel, resumeCarousel: this.resumeCarousel,\n      carDragStart: this.carDragStart, carDragMove: this.carDragMove, carDragEnd: this.carDragEnd, carDragLeave: this.carDragLeave,\n      smPlatforms, smActive, adActive,\n      adImgCls0: adIdx === 0 ? 'is-shown' : '', adImgCls1: adIdx === 1 ? 'is-shown' : '', adImgCls2: adIdx === 2 ? 'is-shown' : '',\n      adNodeCls0: adIdx === 0 ? 'is-active' : '', adNodeCls1: adIdx === 1 ? 'is-active' : '', adNodeCls2: adIdx === 2 ? 'is-active' : '',\n      adSelect0: () => this.setState({ adActiveIdx: 0 }),\n      adSelect1: () => this.setState({ adActiveIdx: 1 }),\n      adSelect2: () => this.setState({ adActiveIdx: 2 })\n    };\n  }\n\n  componentDidMount() {\n    this.loadFeed();\n    this._poll = setInterval(() => this.loadFeed(), (this.props.pollMinutes ?? 15) * 60 * 1000);\n\n    this._carTimer = setInterval(() => {\n      if (this.state.carPaused) return;\n      this.setState(s => ({ carActive: (s.carActive + 1) % Component.CAR_COUNT }));\n    }, 2200);\n\n    const items = Array.from(document.querySelectorAll('[data-svc]'));\n\n    const setActive = (idx, scroll) => {\n      items.forEach((el, i) => el.classList.toggle('open', i === idx));\n      if (scroll) {\n        const y = items[idx].getBoundingClientRect().top + window.scrollY - 90;\n        window.scrollTo({ top: y, behavior: 'smooth' });\n      }\n    };\n\n    items.forEach((el, i) => {\n      const header = el.querySelector('.svc-header');\n      header.addEventListener('click', () => {\n        const isOpen = el.classList.contains('open');\n        const nextIdx = isOpen ? -1 : i;\n        setActive(nextIdx, false);\n        if (nextIdx !== -1) {\n          // Track the header through the 0.5s collapse/expand so it stays at top\n          const target = items[nextIdx];\n          const start = performance.now();\n          const step = () => {\n            const y = target.getBoundingClientRect().top + window.scrollY - 90;\n            window.scrollTo({ top: y, behavior: 'instant' });\n            if (performance.now() - start < 620) requestAnimationFrame(step);\n          };\n          requestAnimationFrame(step);\n        }\n      });\n    });\n\n    // Deep-link: open the service matching the URL hash, else default to first\n    const hash = (window.location.hash || '').replace('#', '');\n    const startIdx = Math.max(0, items.findIndex(el => el.id === hash));\n    setActive(startIdx === -1 ? 0 : startIdx, false);\n    // Scroll the deep-linked one into view after layout settles\n    if (hash && items.some(el => el.id === hash)) {\n      setTimeout(() => setActive(startIdx, true), 200);\n    }\n\n    // Scroll reveal\n    const observer = new IntersectionObserver((entries) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) { entry.target.classList.add('revealed'); observer.unobserve(entry.target); }\n      });\n    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });\n    document.querySelectorAll('[data-reveal]').forEach(el => {\n      const rect = el.getBoundingClientRect();\n      if (rect.top < window.innerHeight) {\n        el.style.transition = 'none'; el.classList.add('revealed'); el.getBoundingClientRect(); el.style.transition = '';\n      } else { observer.observe(el); }\n    });\n  }\n\n  componentWillUnmount() {\n    if (this._carTimer) clearInterval(this._carTimer);\n    if (this._poll) clearInterval(this._poll);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
